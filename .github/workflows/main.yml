name: MoviePluz Subtitle Pipeline

on:
  # Only triggered via workflow_dispatch (from Telegram bot)
  workflow_dispatch:

jobs:
  burn-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fontconfig -qq
          echo "✅ ffmpeg $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q
          echo "✅ Python packages installed"

      - name: Prepare working directory
        run: |
          mkdir -p /tmp/moviepluz
          echo "WORK_DIR=/tmp/moviepluz" >> $GITHUB_ENV

      - name: Run subtitle burn pipeline
        env:
          API_ID:        ${{ secrets.API_ID }}
          API_HASH:      ${{ secrets.API_HASH }}
          SESSION_CODE:  ${{ secrets.SESSION_CODE }}
          ABYSS_API_KEY: ${{ secrets.ABYSS_API_KEY }}
          CHAT_ID:       ${{ secrets.CHAT_ID }}
          BOT_TOKEN:     ${{ secrets.BOT_TOKEN }}
          LOG_CHAT_ID:   ${{ secrets.LOG_CHAT_ID }}
          GH_TOKEN:      ${{ secrets.GH_PAT }}
          GH_REPO:       ${{ github.repository }}
          WORK_DIR:      /tmp/moviepluz
        run: |
          python pipeline.py

      - name: Upload error logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-error-logs
          path: /tmp/moviepluz/*.log
          if-no-files-found: ignore
          retention-days: 3
